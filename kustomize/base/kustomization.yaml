apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: astroshop
    repo: oci://europe-docker.pkg.dev/dynatrace-demoability/helm
    version: 0.3.14
    releaseName: astroshop
    namespace: astroshop
    additionalValuesFiles:
      - values.yaml

namespace: astroshop

resources:
  - ./namespace.yaml

components:
  - ../components/namespace
  - ../components/ownership-labels
  - ../components/flagd-config
